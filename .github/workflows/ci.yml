name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web
        run: npm run build

      - name: Build linkedin-engine
        run: npm run build --workspace=apps/linkedin-engine

      - name: Check formatting
        run: npx prettier --check .
